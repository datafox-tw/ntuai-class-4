<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iceland Lab - 對話助理</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body data-page="chat">
  <header class="top">
    <h1>全能旅行助理</h1>
    <p>Agno Agent 實戰頁：整合 Example 1（基本 Agent）+ 5（Knowledge）+ 6（Memory）+ 2/4（Tools）。</p>
    <nav class="nav">
      <a href="/">首頁</a>
      <a href="/chat" class="active">對話</a>
      <a href="/knowledge">資料庫知識</a>
      <a href="/upload">上傳與預處理</a>
      <a href="/memory">長期記憶</a>
      <a href="/tools">工具工作台</a>
    </nav>
  </header>

  <main class="main">
    <div class="agent-chat-container">
      <div id="agentHistory" class="agent-history">
        <div class="message system">
          你好！我是全能冰島旅行助理。請告訴我你的需求。
        </div>
      </div>
      <div class="agent-input-area">
        <input type="text" id="userId" value="student@example.com" placeholder="用戶ID">
        <div style="margin-top:8px;">
          <button id="resetBtn" class="btn danger">Reset 記憶與對話</button>
        </div>
        <div class="muted" style="margin-top: 8px;">
          範例提問：我和老婆預算 20 萬、想排 5 天自駕行程，必去藍湖，請給每天早午晚安排。
        </div>
        <div class="input-row">
           <textarea id="agentInput" rows="2" placeholder="例如：幫我排 5 天自駕行程/預算 5 萬"></textarea>
           <button id="sendBtn" class="btn">傳送</button>
        </div>
      </div>
    </div>

    <!-- Agent's reasoning box -->
    <div id="thinkingProcess" class="thinking-process hidden">
      <h3>🤖 系統推論與狀態紀錄</h3>
      <div id="thoughtContent" class="thought-content"></div>
      <div id="sourceContent" class="source-content"></div>
    </div>
  </main>
  
  <script src="/assets/app.js"></script>
</body>
</html>
